<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prediction</title>
    <link rel="stylesheet" href="../css/predict.css" />
</head>

<body>
    <div class="container">
        <h1>🎥 Predict Video Views</h1>
        <p>Fill in the video details to get a predicted view count from the backend model.</p>

        <form id="predict-form">
            <input type="number" id="title_length" placeholder="Title Length" required />
            <input type="number" id="upload_hour" placeholder="Upload Hour" required />

            <select id="category" required>
                <option value="">Select Category</option>
                <option value="Tech">Tech</option>
                <option value="AI">AI</option>
                <option value="Coding">Coding</option>
                <option value="Gaming">Gaming</option>
                <option value="Education">Education</option>
                <option value="Finance">Finance</option>
                <option value="Food">Food</option>
                <option value="Travel">Travel</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Music">Music</option>
                <option value="Sports">Sports</option>
                <option value="News">News</option>
                <option value="Lifestyle">Lifestyle</option>
                <option value="Science">Science</option>
                <option value="Business">Business</option>
            </select>

            <input type="number" id="tags_count" placeholder="Tags Count" required />
            <input type="number" id="duration_min" placeholder="Duration (Minutes)" required />
            <input type="number" id="thumbnail_score" placeholder="Thumbnail Score" required />
            <input type="number" id="seo_score" placeholder="SEO Score" required />
            <input type="number" step="0.01" id="ctr_percent" placeholder="CTR %" required />
            <input type="number" id="likes" placeholder="Likes" required />
            <input type="number" id="comments" placeholder="Comments" required />
            <input type="number" id="subscriber_count" placeholder="Subscribers" required />
            <input type="number" id="viral_score" placeholder="Viral Score" required />

            <button type="submit">🚀 Predict Views</button>
        </form>

        <div class="result-card">
            <h2>📈 Predicted Views</h2>
            <div id="prediction">0</div>
            <p id="status">Waiting for prediction...</p>
        </div>

        <div class="result-card">
            <h2>🕘 Recent Predictions</h2>
            <table id="history-table">
                <thead>
                    <tr>
                        <th>Subscribers</th>
                        <th>Likes</th>
                        <th>Predicted Views</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script src="../js/predict.js"></script>
</body>

</html>
